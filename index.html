    <!-- Remove "System Info" section + MutationObserver to reapply on route change -->
    <script>
      (function() {
        function tryRemove() {
          const headers = document.querySelectorAll('.settings-section-title');
          for (const h of headers) {
            if (h.textContent.trim() === 'System Info') {
              const section = h.closest('.settings-section');
              if (section) { section.remove(); return; }
            }
          }
        }
        const obs = new MutationObserver(tryRemove);
        obs.observe(document.body, { childList: true, subtree: true });
        tryRemove();
      })();
    </script>
    <!-- ─── Service Worker Registration (PWA Install) ──────────────────── -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(reg => {
            console.log('[SW] Registered:', reg.scope);
          }).catch(err => console.warn('[SW] Registration failed:', err));
        });
      }
    </script>
